<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>New Bnb Walk Tour Request</title>
</head>
<body style="margin:0; padding:0; background-color:#F4E9D8; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F4E9D8; padding:40px 0;">
<tr>
<td align="center">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#FFFFFF; border-radius:12px; overflow:hidden; border:1px solid #ECDCC0;">

<!-- Header -->
<tr>
<td style="background-color:#2B2015; padding:28px 40px;">
<span style="font-family:Georgia, 'Times New Roman', serif; font-size:22px; font-weight:700; color:#FFFFFF;">Bnb<span style="color:#C1613C;">Walk</span></span>
</td>
</tr>

<!-- Badge -->
<tr>
<td style="padding:32px 40px 0 40px;">
<span style="display:inline-block; font-family:Arial, sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#C1613C;">New Tour Request</span>
</td>
</tr>

<!-- Heading -->
<tr>
<td style="padding:8px 40px 20px 40px;">
<h1 style="margin:0; font-family:Georgia, 'Times New Roman', serif; font-size:26px; font-weight:600; color:#2B2015;">A host wants a walkthrough.</h1>
</td>
</tr>

<!-- Intro -->
<tr>
<td style="padding:0 40px 24px 40px;">
<p style="margin:0; font-family:Arial, sans-serif; font-size:15px; line-height:1.6; color:#4A3A28;">Someone just submitted the contact form on bnbwalk.com. Details below.</p>
</td>
</tr>

<!-- Info table -->
<tr>
<td style="padding:0 40px 32px 40px;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #ECDCC0; border-radius:10px; overflow:hidden;">
<tr>
<td style="padding:14px 18px; background-color:#F4E9D8; font-family:Arial, sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#8A7660; width:140px; border-bottom:1px solid #ECDCC0;">Name</td>
<td style="padding:14px 18px; font-family:Arial, sans-serif; font-size:15px; color:#2B2015; border-bottom:1px solid #ECDCC0;">{{fname}} {{lname}}</td>
</tr>
<tr>
<td style="padding:14px 18px; background-color:#F4E9D8; font-family:Arial, sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#8A7660; border-bottom:1px solid #ECDCC0;">Email</td>
<td style="padding:14px 18px; font-family:Arial, sans-serif; font-size:15px; color:#2B2015; border-bottom:1px solid #ECDCC0;"><a href="mailto:{{email}}" style="color:#C1613C; text-decoration:none;">{{email}}</a></td>
</tr>
<tr>
<td style="padding:14px 18px; background-color:#F4E9D8; font-family:Arial, sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#8A7660; border-bottom:1px solid #ECDCC0;">Phone</td>
<td style="padding:14px 18px; font-family:Arial, sans-serif; font-size:15px; color:#2B2015; border-bottom:1px solid #ECDCC0;"><a href="tel:{{phone}}" style="color:#2B2015; text-decoration:none;">{{phone}}</a></td>
</tr>
<tr>
<td style="padding:14px 18px; background-color:#F4E9D8; font-family:Arial, sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#8A7660; border-bottom:1px solid #ECDCC0;">Listing</td>
<td style="padding:14px 18px; font-family:Arial, sans-serif; font-size:15px; color:#2B2015; border-bottom:1px solid #ECDCC0;"><a href="{{listing}}" style="color:#C1613C; text-decoration:none;">{{listing}}</a></td>
</tr>
<tr>
<td style="padding:14px 18px; background-color:#F4E9D8; font-family:Arial, sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#8A7660; vertical-align:top;">Notes</td>
<td style="padding:14px 18px; font-family:Arial, sans-serif; font-size:15px; color:#2B2015; line-height:1.5;">{{notes}}</td>
</tr>
</table>
</td>
</tr>

<!-- CTA button -->
<tr>
<td style="padding:0 40px 40px 40px;">
<table role="presentation" cellpadding="0" cellspacing="0">
<tr>
<td style="background-color:#C1613C; border-radius:8px;">
<a href="mailto:{{email}}" style="display:inline-block; padding:14px 28px; font-family:Arial, sans-serif; font-size:14px; font-weight:700; color:#FFFFFF; text-decoration:none;">Reply To {{fname}}</a>
</td>
</tr>
</table>
</td>
</tr>

<!-- Footer -->
<tr>
<td style="padding:24px 40px; background-color:#F4E9D8; border-top:1px solid #ECDCC0;">
<p style="margin:0; font-family:Arial, sans-serif; font-size:12px; color:#8A7660;">Bnb Walk &middot; Submitted via bnbwalk.com</p>
</td>
</tr>

</table>
</td>
</tr>
</table>
</body>
</html>
